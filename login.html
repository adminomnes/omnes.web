<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="https://i.ibb.co/nNSzZ3yH/Chat-GPT-Image-Feb-19-2026-05-31-19-AM.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar sesión | OMNES</title>
    <meta name="theme-color" content="#050508" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-deep: #050508;
            --bg-elevated: #12121e;
            --border-subtle: rgba(255,255,255,0.06);
            --border-default: rgba(255,255,255,0.08);
            --text-primary: #f5f5f7;
            --text-secondary: #aeaeb2;
            --text-tertiary: #636366;
            --blue: #4f8cff;
            --cyan: #00e5ff;
            --gradient-primary: linear-gradient(135deg, #4f8cff, #00e5ff);
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 18px;
            --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            --ease-out: cubic-bezier(0.16, 1, 0.3, 1);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        body {
            font-family: var(--font);
            background: var(--bg-deep);
            color: var(--text-primary);
            overflow: hidden;
            height: 100vh;
        }

        .login-page {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-bg {
            position: absolute; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 50% at 30% 40%, rgba(79,140,255,0.08) 0%, transparent 55%),
                radial-gradient(ellipse 60% 45% at 70% 60%, rgba(0,229,255,0.05) 0%, transparent 50%),
                radial-gradient(ellipse 50% 50% at 50% 80%, rgba(124,58,237,0.04) 0%, transparent 50%);
        }

        .login-grid {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.008) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.008) 1px, transparent 1px);
            background-size: 64px 64px;
            mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 20%, transparent 70%);
        }

        .hero-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .login-card {
            position: relative; z-index: 10;
            background: rgba(18,18,30,0.85);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-xl);
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 32px 80px rgba(0,0,0,0.5);
            animation: fadeSlide 0.6s var(--ease-out);
        }

        @keyframes fadeSlide {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 0.75rem;
        }

        .login-logo .brand-mark {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--gradient-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            color: white;
            box-shadow: 0 0 20px rgba(79,140,255,0.25);
        }

        .login-logo .brand-gradient {
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .login-header p {
            font-size: 0.875rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8125rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        .form-control {
            width: 100%;
            padding: 0.85rem 1rem;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border-default);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-size: 0.9375rem;
            font-family: var(--font);
            outline: none;
            transition: border-color 0.2s var(--ease-out), box-shadow 0.2s var(--ease-out);
        }

        .form-control:focus {
            border-color: rgba(79,140,255,0.3);
            box-shadow: 0 0 0 3px rgba(79,140,255,0.06);
        }

        .form-control::placeholder {
            color: var(--text-tertiary);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 0.85rem 2rem;
            border-radius: 999px;
            font-weight: 600;
            font-size: 0.9375rem;
            border: none;
            cursor: pointer;
            font-family: var(--font);
            transition: all 0.25s var(--ease-out);
            width: 100%;
        }

        .btn-primary {
            background: var(--gradient-primary);
            color: white;
            box-shadow: 0 4px 20px rgba(79,140,255,0.25);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 32px rgba(79,140,255,0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
        }

        .login-footer a {
            color: var(--blue);
            font-size: 0.875rem;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s var(--ease-out);
        }

        .login-footer a:hover {
            color: var(--cyan);
        }

        .login-footer .register-link {
            display: block;
            margin-top: 0.75rem;
            color: var(--text-tertiary);
            font-weight: 500;
        }

        .custom-cursor {
            position: fixed;
            width: 8px;
            height: 8px;
            background: var(--blue);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99999;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
            transition: width 0.15s, height 0.15s;
        }

        .cursor-follower {
            position: fixed;
            width: 32px;
            height: 32px;
            border: 1px solid rgba(79,140,255,0.3);
            border-radius: 50%;
            pointer-events: none;
            z-index: 99998;
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease, border-color 0.3s ease, background 0.3s ease;
        }

        .cursor-follower.hovering {
            width: 48px;
            height: 48px;
            border-color: rgba(79,140,255,0.5);
            background: rgba(79,140,255,0.05);
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
                margin: 0 1rem;
            }
        }

        @media (hover: none) {
            .custom-cursor, .cursor-follower { display: none; }
        }
    </style>
</head>
<body>
    <div class="custom-cursor"></div>
    <div class="cursor-follower"></div>

    <div class="login-page">
        <div class="login-bg">
            <div class="login-grid"></div>
        </div>
        <canvas id="hero-canvas" class="hero-canvas"></canvas>

        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <span class="brand-mark"><i class="fa-solid fa-bolt"></i></span>
                    OM<span class="brand-gradient">NES</span>
                </div>
                <p>Inicia sesión en tu cuenta</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" class="form-control" placeholder="tu@correo.cl" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary">Ingresar</button>
            </form>

            <div class="login-footer">
                <a href="#">¿Olvidaste tu contraseña?</a>
                <span class="register-link">¿No tienes cuenta? <a href="/personas-registro.html">Regístrate aquí</a></span>
            </div>
        </div>
    </div>

    <script type="module">
        import { supabase } from '/src/js/supabaseClient.js'

        const loginForm = document.getElementById('loginForm');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const btn = loginForm.querySelector('button');

            btn.innerText = "VERIFICANDO...";
            btn.disabled = true;

            try {
                if (email === 'admin@omnes.cl' && password === 'omnes-dev-2026') {
                    window.location.href = '/dashboard.html';
                    return;
                }

                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password,
                })

                if (error) throw error;
                window.location.href = '/dashboard.html';

            } catch (error) {
                let msg = "Acceso denegado: " + error.message;
                if (error.message.includes("Email not confirmed")) {
                    msg = "Error: El correo aún no ha sido confirmado. Revisa tu bandeja de entrada.";
                }
                alert(msg);
                btn.innerText = "Ingresar";
                btn.disabled = false;
            }
        });
    </script>
    <script type="module" src="/src/js/main.js"></script>
</body>
</html>
